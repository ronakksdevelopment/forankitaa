<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Ankitaa 🤞🏻❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Romantic animated gradient background */
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #fbc2eb, #a18cd1);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden; /* Prevents scrollbars when button flies around */
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        .gif-container {
            margin-bottom: 20px;
        }

        .gif-container img {
            width: 180px;
            border-radius: 15px;
            pointer-events: none;
        }

        h1 {
            color: #ff4d6d;
            font-size: 1.6rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        p {
            color: #555;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            position: relative; /* Context for the dodging button */
            height: 50px;
        }

        button {
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .yes-btn {
            background-color: #ff4d6d;
            color: white;
            z-index: 2;
        }

        .yes-btn:hover {
            background-color: #ff2a55;
            transform: scale(1.05);
        }

        .no-btn {
            background-color: #fff;
            color: #ff4d6d;
            border: 2px solid #ff4d6d;
            position: absolute; /* Allows it to move freely */
            left: calc(50% + 10px); /* Initial position next to Yes */
        }

        /* Heart confetti styles */
        .heart {
            position: fixed;
            font-size: 1.5rem;
            top: -10vh;
            animation: fall 3s linear forwards;
            z-index: 100;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .no-btn {
                left: calc(50% + 5px);
            }
        }
    </style>
</head>
<body>

    <div class="card" id="card">
        <div class="gif-container">
            <img id="mainGif" src="https://media.tenor.com/efjiXv2Jm4sAAAAi/peach-goma.gif" alt="Cute Cats">
        </div>
        <h1 id="question">Ankitaa 🤞🏻</h1>
        <p id="subtext">Do you love me? 🥺</p>
        
        <div class="buttons">
            <button class="yes-btn" id="yesBtn">Yes ❤️</button>
            <button class="no-btn" id="noBtn">No</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const mainGif = document.getElementById('mainGif');
        const question = document.getElementById('question');
        const subtext = document.getElementById('subtext');
        const buttonsContainer = document.querySelector('.buttons');

        // Array of progressively desperate/cute messages
        const noMessages = [
            "Please think again! 🥺",
            "Ek aur baar Soch lo! 😭",
            "Are you absolutely sure?",
            "Beautiful pls Man jao na! 💔",
            "Kitna code likh waogi? 💻",
            "You're breaking my heart! 😿",
            "I'm gonna cry now...",
            "Just click YES! 😤"
        ];

        let messageIndex = 0;

        // Function to move the "No" button
        const dodgeButton = () => {
            // Change GIF to something sad/pleading
            mainGif.src = "https://media.tenor.com/hI2HkYg5h3YAAAAi/peach-cat-crying.gif";
            
            // Update the text
            subtext.innerText = noMessages[messageIndex % noMessages.length];
            messageIndex++;

            // Calculate new random position within viewport boundaries
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;
            
            // Keep button safely inside the screen
            const maxX = window.innerWidth - btnWidth - 20;
            const maxY = window.innerHeight - btnHeight - 20;

            const randomX = Math.max(20, Math.floor(Math.random() * maxX));
            const randomY = Math.max(20, Math.floor(Math.random() * maxY));

            // Apply new coordinates (relative to viewport)
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
        };

        // Trigger dodge on both hover (desktop) and touch/click (mobile)
        noBtn.addEventListener('mouseover', dodgeButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevent accidental mobile clicks
            dodgeButton();
        });
        noBtn.addEventListener('click', dodgeButton);

        // Function for when she clicks YES
        yesBtn.addEventListener('click', () => {
            // Update UI to success state
            mainGif.src = "https://media.tenor.com/TKWbwYg6N2MAAAAi/peach-goma.gif";
            question.innerText = "I knew it! 🥰";
            subtext.innerText = "You love me a lot! ❤️";
            
            // Hide buttons
            buttonsContainer.style.display = 'none';

            // Create falling hearts effect
            createHearts();

            // WhatsApp Redirect Setup
            const phoneNumber = "917005966672";
            // encodeURIComponent ensures emojis and spaces format perfectly for URLs
            const message = encodeURIComponent("I love you Raj 🫣❤️");
            const whatsappURL = `https://wa.me/${phoneNumber}?text=${message}`;

            // Redirect after 2.5 seconds so she can read the happy message
            setTimeout(() => {
                window.location.href = whatsappURL;
            }, 2500);
        });

        // Fun little heart confetti function
        function createHearts() {
            for(let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.innerHTML = '❤️';
                    heart.classList.add('heart');
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(heart);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
